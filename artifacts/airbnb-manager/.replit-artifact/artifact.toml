kind = "web"
previewPath = "/"
title = "Airbnb Manager"
version = "1.0.0"
id = "artifacts/airbnb-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21466

[services.development]
run = "pnpm --filter @workspace/airbnb-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/airbnb-manager", "run", "build" ]
publicDir = "artifacts/airbnb-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21466"
BASE_PATH = "/"
